name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout examples repo
        uses: actions/checkout@v4
        with:
          path: ai-copilot-examples

      - name: Checkout web SDK
        uses: actions/checkout@v4
        with:
          repository: Auto-no-mous-AI/ai-copilot-sdk
          path: ai-copilot-sdk

      - name: Checkout React SDK
        uses: actions/checkout@v4
        with:
          repository: Auto-no-mous-AI/ai-copilot-sdk-react
          path: ai-copilot-sdk-react

      - name: Checkout Angular SDK
        uses: actions/checkout@v4
        with:
          repository: Auto-no-mous-AI/ai-copilot-sdk-angular
          path: ai-copilot-sdk-angular

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build SDKs
        shell: bash
        run: |
          set -euo pipefail
          cd ai-copilot-sdk && npm ci && npm run build
          cd ../ai-copilot-sdk-react && npm ci && npm run build
          cd ../ai-copilot-sdk-angular && npm ci && npm run build

      - name: Validate mock API
        run: node --check shared-mocks/mock-api.mjs
        working-directory: ai-copilot-examples

      - name: Build vanilla example
        working-directory: ai-copilot-examples/vanilla-example
        run: npm ci && npm run build

      - name: Build react example
        working-directory: ai-copilot-examples/react-example
        run: npm ci && npm run build

      - name: Build angular example
        working-directory: ai-copilot-examples/angular-example
        run: npm ci && npm run build
